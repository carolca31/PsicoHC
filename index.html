<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>PsicoHC — Carol Castillo</title>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-storage-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:Georgia,'Times New Roman',serif;background:#FDF9F4;color:#3D1F0D;font-size:14px;}
:root{
  --bg:#FDF9F4;--surface:#FFFFFF;--alt:#FFF5F0;--border:#F0D9CC;
  --accent:#5DC9C9;--adk:#3AADAD;--apl:#E0F7F7;
  --rose:#E8857A;--rpl:#FDECEA;--yellow:#F5C842;--ypl:#FFFBEA;
  --brown:#3D1F0D;--mid:#7A5C4A;--light:#B89A8A;--danger:#C0392B;
}
input,select,textarea,button{font-family:inherit;font-size:13px;}
input,select,textarea{width:100%;padding:8px 10px;border:1.5px solid var(--border);border-radius:8px;color:var(--brown);background:var(--surface);outline:none;transition:border-color 0.2s;}
input:focus,select:focus,textarea:focus{border-color:var(--accent);}
textarea{resize:vertical;line-height:1.6;}
button{cursor:pointer;}

/* Layout */
#app{display:flex;height:100vh;overflow:hidden;}
#sidebar{width:265px;flex-shrink:0;background:var(--surface);border-right:2px solid var(--border);display:flex;flex-direction:column;overflow:hidden;}
#main{flex:1;display:flex;flex-direction:column;min-width:0;overflow:hidden;}

/* Sidebar header */
#sh{padding:14px 13px 12px;border-bottom:2px solid var(--border);background:linear-gradient(135deg,rgba(93,201,201,.09),rgba(245,200,66,.09));}
#logo-row{display:flex;align-items:center;gap:9px;margin-bottom:4px;}
#logo-icon{width:36px;height:36px;background:linear-gradient(135deg,var(--accent),var(--adk));border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;}
#save-st{font-size:10px;font-weight:700;text-align:right;margin-bottom:9px;color:var(--accent);}
#btn-new{width:100%;padding:8px 0;background:linear-gradient(135deg,var(--accent),var(--adk));color:#fff;border:none;border-radius:8px;font-size:12px;font-weight:700;}
#btn-new:hover{opacity:.88;}
#srch-wrap{padding:9px 11px 7px;}
#srch{padding:7px 10px;font-size:12px;background:var(--alt);}
#plist{flex:1;overflow-y:auto;padding:3px 11px 11px;}
#sfoot{padding:9px 13px;border-top:1px solid var(--border);background:var(--ypl);text-align:center;font-size:10px;color:var(--mid);font-weight:600;}

/* Patient cards */
.pcard{background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:11px;margin-bottom:7px;cursor:pointer;transition:all .15s;}
.pcard:hover{border-color:var(--accent);box-shadow:0 2px 10px rgba(93,201,201,.15);}
.pc-hc{font-size:10px;font-weight:800;color:var(--accent);letter-spacing:.12em;margin-bottom:2px;}
.pc-name{font-size:13px;font-weight:700;color:var(--brown);}
.pc-sub{font-size:11px;color:var(--mid);margin-top:2px;}
.pc-date{font-size:10px;color:var(--light);margin-top:4px;}
.pc-tags{margin-top:7px;display:flex;flex-wrap:wrap;gap:3px;}
.pc-tag{padding:2px 7px;background:var(--apl);color:var(--adk);border-radius:10px;font-size:10px;font-weight:700;}
.pc-del{float:right;padding:3px 7px;background:var(--rpl);color:var(--danger);border:none;border-radius:5px;font-size:11px;}

/* Main views */
#welcome{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;padding:40px;background:radial-gradient(ellipse at center,var(--apl) 0%,var(--bg) 70%);}
#pview{display:none;flex:1;flex-direction:column;min-width:0;overflow:hidden;}

/* Patient header */
#phdr{padding:10px 18px;border-bottom:2px solid var(--border);background:var(--surface);display:flex;align-items:center;gap:12px;flex-shrink:0;}
#btn-back{padding:5px 11px;background:var(--alt);color:var(--mid);border:1.5px solid var(--border);border-radius:7px;font-size:11px;}

/* Tab nav */
#tabnav{display:flex;overflow-x:auto;border-bottom:2px solid var(--border);background:var(--surface);flex-shrink:0;scrollbar-width:none;}
#tabnav::-webkit-scrollbar{display:none;}
.tbtn{padding:8px 11px;border:none;border-bottom:3px solid transparent;background:transparent;color:var(--mid);font-size:11px;font-weight:500;white-space:nowrap;display:flex;align-items:center;gap:3px;transition:all .15s;}
.tbtn.act{border-bottom-color:var(--accent);background:var(--apl);color:var(--adk);font-weight:700;}
#tcontent{flex:1;overflow-y:auto;padding:20px 24px;-webkit-overflow-scrolling:touch;}

/* Sections */
.sec{margin-bottom:24px;}
.sec-hdr{display:flex;align-items:center;gap:9px;margin-bottom:13px;}
.sec-num{width:26px;height:26px;border-radius:6px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:800;flex-shrink:0;}
.sec-ttl{font-size:12px;font-weight:800;color:var(--brown);text-transform:uppercase;letter-spacing:.08em;}
.sec-body{background:var(--surface);border:1.5px solid var(--border);border-radius:11px;padding:16px 18px;}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:0 18px;}
.g3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:0 14px;}

/* Fields */
.fld{margin-bottom:14px;}
.fld label{display:block;font-size:10px;font-weight:700;color:var(--mid);margin-bottom:3px;text-transform:uppercase;letter-spacing:.05em;}
.fld .hint{font-size:10px;color:var(--light);margin-top:3px;font-style:italic;}

/* Multichk */
.mchk{display:flex;flex-wrap:wrap;gap:6px;margin-top:6px;}
.cbtn{padding:4px 10px;border-radius:18px;font-size:11px;border:1.5px solid var(--border);background:var(--surface);color:var(--mid);}
.cbtn.on{border-color:var(--accent);background:var(--apl);color:var(--adk);font-weight:700;}

/* Scale */
.scrow{display:flex;gap:6px;align-items:center;flex-wrap:wrap;margin-top:6px;}
.sbtn{width:34px;height:34px;border-radius:50%;border:2px solid var(--border);background:var(--surface);color:var(--mid);font-size:12px;font-weight:700;flex-shrink:0;}
.sbtn.on{border-color:var(--accent);background:var(--accent);color:#fff;}
.slbl{font-size:11px;color:var(--adk);font-weight:700;margin-left:5px;}

/* Item cards (sessions/evals) */
.icard{background:var(--alt);border-radius:9px;margin-bottom:9px;border:1px solid var(--border);overflow:hidden;}
.ihdr{display:flex;justify-content:space-between;align-items:center;padding:11px 14px;cursor:pointer;}
.inum{width:24px;height:24px;border-radius:5px;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:10px;font-weight:800;flex-shrink:0;}
.ibody{padding:0 14px 14px;display:none;}

/* Buttons */
.btn-add{padding:6px 14px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:11px;font-weight:700;}
.btn-del{padding:3px 8px;background:var(--rpl);color:var(--danger);border:none;border-radius:5px;font-size:11px;}
.btn-green{padding:8px 18px;background:linear-gradient(135deg,var(--accent),var(--adk));color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;}
.btn-word{padding:8px 18px;background:linear-gradient(135deg,#2B5797,#1a3a6e);color:#fff;border:none;border-radius:8px;font-size:13px;font-weight:700;}

/* DSM modal */
#dsm-modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:1000;align-items:center;justify-content:center;padding:20px;}
#dsm-modal.open{display:flex;}
#dsm-box{background:var(--surface);border-radius:14px;max-width:580px;width:100%;max-height:80vh;overflow-y:auto;padding:24px;}
#dsm-box h3{font-size:15px;color:var(--brown);margin-bottom:6px;}
#dsm-box .dsm-code{font-size:11px;color:var(--accent);font-weight:700;margin-bottom:12px;}
#dsm-box .dsm-body{font-size:12px;color:var(--mid);line-height:1.7;}
#dsm-close{float:right;padding:4px 10px;background:var(--rpl);color:var(--danger);border:none;border-radius:6px;font-size:12px;font-weight:700;}

/* Upload area */
.upload-area{border:2px dashed var(--border);border-radius:9px;padding:20px;text-align:center;cursor:pointer;transition:all .2s;margin-top:8px;}
.upload-area:hover{border-color:var(--accent);background:var(--apl);}
.uploaded-file{display:flex;align-items:center;gap:8px;padding:8px 11px;background:var(--alt);border-radius:7px;margin-top:6px;font-size:12px;}

/* Loading */
#loading{display:flex;height:100vh;align-items:center;justify-content:center;flex-direction:column;gap:14px;background:var(--bg);}

/* Informe */
pre{background:var(--alt);border:1px solid var(--border);border-radius:9px;padding:16px;font-size:11px;line-height:1.7;color:var(--brown);font-family:'Courier New',monospace;white-space:pre-wrap;word-break:break-word;}

/* Overlay */
#overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:99;}
#overlay.open{display:block;}
#btn-menu{display:none;padding:5px 10px;background:var(--accent);color:#fff;border:none;border-radius:7px;font-size:16px;}

@media(max-width:720px){
  #sidebar{width:100%;position:fixed;top:0;left:0;height:100vh;z-index:100;transform:translateX(-100%);transition:transform .3s;}
  #sidebar.open{transform:translateX(0);}
  .g2,.g3{grid-template-columns:1fr;}
  #tcontent{padding:14px;}
  #btn-menu{display:flex!important;}
}
</style>
</head>
<body>

<div id="loading">
  <div style="font-size:46px">🧠</div>
  <div style="font-size:14px;color:var(--mid);font-weight:600">Cargando PsicoHC...</div>
  <div style="font-size:11px;color:var(--light)">Psic. Carol Castillo</div>
</div>

<div id="app" style="display:none">
<div id="overlay" onclick="closeSB()"></div>

<!-- DSM Modal -->
<div id="dsm-modal">
  <div id="dsm-box">
    <button id="dsm-close" onclick="closeDSM()">✕ Cerrar</button>
    <div id="dsm-code" class="dsm-code"></div>
    <h3 id="dsm-title"></h3>
    <div id="dsm-body" class="dsm-body"></div>
  </div>
</div>

<!-- SIDEBAR -->
<div id="sidebar">
  <div id="sh">
    <div id="logo-row">
      <div id="logo-icon">🧠</div>
      <div>
        <div style="font-size:14px;font-weight:800;color:var(--brown);line-height:1">PsicoHC</div>
        <div style="font-size:10px;color:var(--rose);font-weight:700;margin-top:2px">Carol Castillo 💚💛🩷</div>
      </div>
    </div>
    <div id="save-st">☁️ Guardado en la nube</div>
    <button id="btn-new" onclick="createPatient()">+ Nueva Historia Clínica</button>
  </div>
  <div id="srch-wrap"><input id="srch" placeholder="🔍 Buscar paciente..." oninput="renderList()"/></div>
  <div id="plist"></div>
  <div id="sfoot">0 historias clínicas</div>
</div>

<!-- MAIN -->
<div id="main">
  <div id="welcome">
    <div style="font-size:52px">🧠</div>
    <div style="font-size:20px;font-weight:800;color:var(--brown)">PsicoHC</div>
    <div style="font-size:13px;color:var(--rose);font-weight:700">Psic. Carol Castillo · C.I. 21.578.572 · FPV 11064 💚💛🩷</div>
    <div style="font-size:12px;color:var(--mid);max-width:360px;text-align:center;line-height:1.7">Selecciona un paciente o crea una nueva historia clínica.</div>
    <button class="btn-green" onclick="createPatient()">+ Nueva Historia Clínica</button>
    <div style="margin-top:6px;padding:7px 14px;background:var(--ypl);border:1px solid var(--yellow);border-radius:8px;font-size:11px;color:var(--mid);text-align:center">☁️ Datos guardados automáticamente en Google Cloud</div>
  </div>

  <div id="pview">
    <div id="phdr">
      <button id="btn-menu" onclick="openSB()">☰</button>
      <button id="btn-back" onclick="showWelcome()">← Volver</button>
      <div>
        <div id="hdr-hc" style="font-size:10px;font-weight:800;color:var(--accent);letter-spacing:.14em"></div>
        <div id="hdr-name" style="font-size:14px;font-weight:800;color:var(--brown)"></div>
      </div>
      <div id="hdr-date" style="margin-left:auto;font-size:10px;color:var(--light)"></div>
    </div>
    <div id="tabnav"></div>
    <div id="tcontent"></div>
  </div>
</div>
</div>

<script>
// ── Firebase ──────────────────────────────────────────────────────────────────
const firebaseConfig={
  apiKey:"AIzaSyBHcgxdXFz0vlSIBamTA_4fxd59HQ3qzIY",
  authDomain:"psicohcpc-c36fc.firebaseapp.com",
  projectId:"psicohcpc-c36fc",
  storageBucket:"psicohcpc-c36fc.firebasestorage.app",
  messagingSenderId:"1063196208857",
  appId:"1:1063196208857:web:d24d6cf655e7ddd35b58c8"
};
firebase.initializeApp(firebaseConfig);
const db=firebase.firestore();
const storage=firebase.storage();

// ── State ─────────────────────────────────────────────────────────────────────
let patients=[],selectedId=null,activeTab="identificacion",yearCounter={},saveTimer=null;
const uid=()=>Math.random().toString(36).slice(2,9);
const today=()=>new Date().toISOString().split("T")[0];
const nowDate=()=>new Date().toLocaleDateString("es-VE",{day:"2-digit",month:"long",year:"numeric"});
const fmtDate=d=>d?new Date(d+"T00:00:00").toLocaleDateString("es-VE",{day:"2-digit",month:"long",year:"numeric"}):"—";
const esc=s=>String(s||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");

// ── Empty patient ─────────────────────────────────────────────────────────────
function emptyP(){
  return{
    id:uid(),hcCode:"",
    nombre:"",edad:"",cedula:"",fechaNac:"",lugarNac:"",sexo:"",direccion:"",
    gradoEscolar:"",institucion:"",fechaApertura:today(),
    repNombre:"",repParentesco:"",repTelefono:"",personasEnCasa:"",convivientes:[],
    motivoConsulta:"",
    embarazoPlaneado:"",cuidadosPrenatales:"",saludMadre:"",
    complicacionesEmbarazo:[],otrasCompEmbarazo:"",
    tipoNacimiento:"",semanasEmbarazo:"",tipoParto:"",
    pesoNacer:"",tallaNacer:"",complicacionesNacimiento:[],
    primeraSemanaNac:[],otrosPrimeraSemanaNac:"",
    descripcionBebe:[],otrosDescBebe:"",preocupacionEtapaTemprana:"",
    edadCamino:"",controlCefalico:"",primerasPalabras:"",edadPrimerasPalabras:"",
    desarrolloLenguaje:"",controlEsfinteresDiurno:"",controlEsfinteresNocturno:"",
    seCalmafacilmente:"",desregulacion:"",
    sensibilidadRuidos:"",sensibilidadLuces:"",sensibilidadTexturas:"",
    alimentacionSelectivaTextura:"",sensibilidadOlores:"",busquedaEstimulos:"",
    emocionesFrecuentes:[],miedosPersistentes:[],otrosMiedos:"",
    sintomasAnsiedad:[],pensamientosNegativos:"",
    asistenciaEscolar:"",bullying:"",relacionCompaneros:"",relacionDocentes:"",
    comportamientoClase:[],referidoConducta:"",cursoPreescolar:"",dificultadesAcademicas:[],
    horaDormir:"",horaDespertar:"",habSueno:[],habAlimentacion:[],alimentoRechazo:"",
    habAutonomia:[],responsabilidadCasa:"",actividadesExtracurriculares:"",
    relacionPadres:"",respuestaLimites:"",vinculosPositivos:[],nombresVinculos:"",
    reaccionFrustracion:"",conductasEnCasa:[],contextoConductas:[],
    intervencionesPrevias:[],
    diagnosticoPrevio:"",medicacionActual:"",especialistaMedicacion:"",
    terapiasHistorial:[],diagnosticoEspecialista:"",informesPrevios:[],
    observacionActitud:"",observacionInteraccion:"",observacionLenguaje:"",
    observacionJuego:"",observacionEstadoEmocional:"",observacionInsight:"",
    observacionDisposicion:"",observacionNotas:"",
    hipotesisClinica:"",planEvaluacion:[],otrasPruebas:"",
    evaluaciones:[],sesiones:[],
    diagnostico:[],impresionDiagnostica:"",
    createdAt:today()
  };
}

// ── Save ──────────────────────────────────────────────────────────────────────
function saveP(p){
  setSS("saving");clearTimeout(saveTimer);
  saveTimer=setTimeout(async()=>{
    try{await db.collection("pacientes").doc(p.id).set(p);setSS("saved");}
    catch(e){setSS("error");}
  },900);
}
function setSS(s){
  const el=document.getElementById("save-st");if(!el)return;
  if(s==="saving"){el.style.color="var(--yellow)";el.textContent="💾 Guardando...";}
  else if(s==="error"){el.style.color="var(--danger)";el.textContent="⚠️ Error al guardar";}
  else{el.style.color="var(--accent)";el.textContent="☁️ Guardado en la nube";}
}
function getP(){return patients.find(p=>p.id===selectedId);}
function upd(f,v){const p=getP();if(!p)return;p[f]=v;saveP({...p});}
function updRender(f,v){upd(f,v);renderTab();}

// ── Create / Delete ───────────────────────────────────────────────────────────
async function createPatient(){
  const yr=new Date().getFullYear();
  const nx=(yearCounter[yr]||0)+1;yearCounter[yr]=nx;
  await db.collection("meta").doc("yearCounter").set(yearCounter);
  const p=emptyP();p.hcCode=`HC-${yr}-${String(nx).padStart(3,"0")}`;
  patients.unshift(p);
  await db.collection("pacientes").doc(p.id).set(p);
  selectP(p.id);renderList();closeSB();
}
async function deletePatient(id){
  if(!confirm("¿Eliminar esta historia clínica? No se puede deshacer."))return;
  await db.collection("pacientes").doc(id).delete();
  patients=patients.filter(p=>p.id!==id);
  if(selectedId===id)showWelcome();
  renderList();
}
function selectP(id){
  selectedId=id;activeTab="identificacion";
  const p=getP();if(!p)return;
  document.getElementById("welcome").style.display="none";
  document.getElementById("pview").style.display="flex";
  document.getElementById("hdr-hc").textContent=p.hcCode;
  document.getElementById("hdr-name").textContent=p.nombre||"Paciente sin nombre";
  document.getElementById("hdr-date").textContent="Apertura: "+fmtDate(p.fechaApertura);
  renderTabs();renderTab();closeSB();
}
function showWelcome(){
  selectedId=null;
  document.getElementById("welcome").style.display="flex";
  document.getElementById("pview").style.display="none";
}

// ── List ──────────────────────────────────────────────────────────────────────
function renderList(){
  const q=(document.getElementById("srch").value||"").toLowerCase();
  const f=patients.filter(p=>!q||(p.nombre||"").toLowerCase().includes(q)||(p.hcCode||"").toLowerCase().includes(q)||(p.cedula||"").includes(q));
  document.getElementById("plist").innerHTML=f.length===0
    ?`<div style="text-align:center;padding:28px 0;color:var(--light);font-size:12px">${patients.length===0?"Crea la primera historia clínica 🌟":"Sin resultados."}</div>`
    :f.map(p=>`<div class="pcard" onclick="selectP('${p.id}')">
      <button class="pc-del" onclick="event.stopPropagation();deletePatient('${p.id}')">✕</button>
      <div class="pc-hc">${p.hcCode}</div>
      <div class="pc-name">${esc(p.nombre)||"Sin nombre"}</div>
      <div class="pc-sub">${p.edad?p.edad+" años":"Edad no registrada"}${p.gradoEscolar?" · "+p.gradoEscolar:""}</div>
      <div class="pc-date">Apertura: ${fmtDate(p.fechaApertura)} · ${(p.sesiones||[]).length} sesiones</div>
      ${p.diagnostico&&p.diagnostico.length?`<div class="pc-tags">${p.diagnostico.slice(0,3).map(d=>`<span class="pc-tag">${d}</span>`).join("")}</div>`:""}
    </div>`).join("");
  document.getElementById("sfoot").textContent=`${patients.length} historia${patients.length!==1?"s":""} clínica${patients.length!==1?"s":""}`;
}

// ── Tabs ──────────────────────────────────────────────────────────────────────
const TABS=[
  {k:"identificacion",l:"Identificación",i:"👤"},
  {k:"representante",l:"Representante",i:"👪"},
  {k:"embarazo",l:"Embarazo y Nacimiento",i:"🤰"},
  {k:"desarrollo",l:"Desarrollo",i:"🌱"},
  {k:"emocional",l:"Emocional",i:"💭"},
  {k:"escolar",l:"Escolar",i:"🏫"},
  {k:"habitos",l:"Hábitos",i:"🌙"},
  {k:"familiar",l:"Familiar",i:"🏠"},
  {k:"antecedentes",l:"Antecedentes",i:"📋"},
  {k:"clinico",l:"Observación Clínica",i:"🔍"},
  {k:"hipotesis",l:"Hipótesis y Plan",i:"🧩"},
  {k:"evaluaciones",l:"Evaluaciones",i:"📊"},
  {k:"sesiones",l:"Sesiones",i:"📅"},
  {k:"diagnostico",l:"Diagnóstico",i:"🩺"},
  {k:"informe",l:"Informe",i:"📄"},
];
function renderTabs(){
  document.getElementById("tabnav").innerHTML=TABS.map(t=>
    `<button class="tbtn${activeTab===t.k?" act":""}" onclick="switchTab('${t.k}')">${t.i} ${t.l}</button>`
  ).join("");
}
function switchTab(k){activeTab=k;renderTabs();renderTab();}

// ── HTML helpers ──────────────────────────────────────────────────────────────
function sec(num,title,body){
  return`<div class="sec"><div class="sec-hdr"><div class="sec-num">${num}</div><div class="sec-ttl">${title}</div></div><div class="sec-body">${body}</div></div>`;
}
function fld(label,inner,hint=""){
  return`<div class="fld"><label>${label}</label>${inner}${hint?`<div class="hint">${hint}</div>`:""}</div>`;
}
function inp(f,v,type="text",ph=""){
  return`<input type="${type}" value="${esc(v)}" placeholder="${ph}" oninput="upd('${f}',this.value)">`;
}
function ta(f,v,rows=3,ph=""){
  return`<textarea rows="${rows}" placeholder="${ph}" oninput="upd('${f}',this.value)">${esc(v)}</textarea>`;
}
function sel(f,v,opts){
  return`<select onchange="upd('${f}',this.value)"><option value="">Seleccionar...</option>${opts.map(o=>`<option value="${o}"${v===o?" selected":""}>${o}</option>`).join("")}</select>`;
}
function mchk(label,f,v=[],opts,hint=""){
  return`<div class="fld"><label>${label}</label><div class="mchk">${opts.map(o=>`<button class="cbtn${v.includes(o)?" on":""}" onclick="toggleArr('${f}','${o}')">${o}</button>`).join("")}</div>${hint?`<div class="hint">${hint}</div>`:""}</div>`;
}
function scale(label,f,v,lbls=["Nunca","Rara vez","A veces","Frecuentemente","Siempre"]){
  const btns=Array.from({length:lbls.length},(_,i)=>`<button class="sbtn${String(i)===String(v)?" on":""}" onclick="upd('${f}','${i}')">${i}</button>`).join("");
  const lbl=v!==""&&lbls[parseInt(v)]?`<span class="slbl">${lbls[parseInt(v)]}</span>`:"";
  return`<div class="fld"><label>${label}</label><div class="scrow">${btns}${lbl}</div><div class="hint">0 = ${lbls[0]} &nbsp;|&nbsp; ${lbls.length-1} = ${lbls[lbls.length-1]}</div></div>`;
}
function g2(c){return`<div class="g2">${c}</div>`;}
function g3(c){return`<div class="g3">${c}</div>`;}

function toggleArr(f,opt){const p=getP();if(!p)return;const a=p[f]||[];p[f]=a.includes(opt)?a.filter(x=>x!==opt):[...a,opt];saveP({...p});renderTab();}

function copiarInforme(){
  const txt=document.getElementById("informe-text").textContent;
  navigator.clipboard.writeText(txt).then(()=>{
    const b=document.getElementById("btn-copy");
    b.textContent="✓ Copiado";setTimeout(()=>{b.textContent="📋 Copiar texto";},2000);
  });
}
function exportarWord(){
  const p=getP();if(!p)return;
  const txt=genInforme(p);
  const html=`<html><head><meta charset="UTF-8"><style>body{font-family:Calibri,sans-serif;font-size:11pt;margin:2.5cm;}pre{font-family:Calibri,sans-serif;white-space:pre-wrap;}</style></head><body><pre>${txt}</pre></body></html>`;
  const blob=new Blob([html],{type:"application/msword"});
  const a=document.createElement("a");
  a.href=URL.createObjectURL(blob);
  a.download=`Informe_${p.nombre||p.hcCode}_${today()}.doc`;
  a.click();
}

const DSM_DATA={
  "TDAH — Presentación combinada":{code:"F90.2",desc:"Cumple criterios tanto de inatención como de hiperactividad/impulsividad. Patrón persistente de inatención y/o hiperactividad-impulsividad que interfiere con el funcionamiento o desarrollo. Síntomas presentes antes de los 12 años, en dos o más contextos. 6 o más síntomas de inatención Y 6 o más de hiperactividad/impulsividad (5 en adolescentes/adultos) durante al menos 6 meses."},
  "TDAH — Predominio inatento":{code:"F90.0",desc:"6 o más síntomas de inatención durante al menos 6 meses: no presta atención a detalles, dificultad para mantener la atención, no parece escuchar, no sigue instrucciones, dificultad para organizar tareas, evita tareas que requieren esfuerzo mental sostenido, pierde cosas, se distrae fácilmente, es olvidadizo."},
  "TDAH — Predominio hiperactivo/impulsivo":{code:"F90.1",desc:"6 o más síntomas de hiperactividad/impulsividad durante al menos 6 meses: mueve manos y pies, se levanta cuando debe permanecer sentado, corre o salta en momentos inapropiados, incapaz de jugar tranquilo, habla en exceso, responde antes de que terminen la pregunta, dificultad para esperar su turno, interrumpe o se inmiscuye."},
  "Trastorno de ansiedad generalizada":{code:"F41.1",desc:"Ansiedad y preocupación excesivas sobre una amplia gama de actividades o sucesos, más días de los que está ausente, durante 6 o más meses. La persona tiene dificultad para controlar la preocupación. Se asocia con 3 o más de: inquietud, fácil fatigabilidad, dificultad para concentrarse, irritabilidad, tensión muscular, problemas de sueño."},
  "Trastorno de ansiedad por separación":{code:"F93.0",desc:"Miedo o ansiedad excesiva e inapropiada para el nivel de desarrollo del individuo sobre la separación de las personas a quienes está vinculado, manifestado por 3 o más de: angustia al anticipar separación, preocupación por perder a las figuras de apego, miedo a estar solo, pesadillas con separación, síntomas físicos al separarse."},
  "Fobia específica":{code:"F40.2",desc:"Miedo o ansiedad intensa sobre un objeto o situación específica. El objeto fóbico casi siempre provoca miedo o ansiedad inmediata. La persona evita activamente el objeto. El miedo es desproporcionado al peligro real. Persistente, generalmente 6 o más meses."},
  "Mutismo selectivo":{code:"F94.0",desc:"Fallo constante para hablar en situaciones sociales específicas en las que existe expectativa de hablar, a pesar de hacerlo en otras situaciones. Interfiere en logros educativos o en la comunicación social. Duración de al menos 1 mes (no se limita al primer mes de escuela)."},
  "Trastorno depresivo mayor":{code:"F32",desc:"5 o más de los siguientes síntomas durante 2 semanas: estado de ánimo deprimido, pérdida de interés o placer, cambio de peso/apetito, insomnio o hipersomnia, agitación o enlentecimiento psicomotor, fatiga, sentimientos de inutilidad o culpa, dificultad para concentrarse, pensamientos de muerte. Debe incluir estado de ánimo deprimido o pérdida de interés."},
  "Trastorno disruptivo del estado de ánimo":{code:"F34.8",desc:"Irritabilidad grave y persistente, con arrebatos de temperamento graves y recurrentes (3 o más veces por semana), desproporcionados a la situación, en al menos 2 contextos. Estado de ánimo irritable o irascible persistente entre los arrebatos. Diagnóstico no antes de los 6 años ni después de los 18."},
  "Trastorno oposicionista desafiante (TOD)":{code:"F91.3",desc:"Patrón de humor enfadado/irritable, comportamiento discutidor/desafiante o actitud vengativa que dura al menos 6 meses. Incluye: pierde la calma, es susceptible, está enfadado/resentido, discute con adultos, desafía activamente las reglas, culpa a los demás de sus errores, es rencoroso o vengativo."},
  "Trastorno de conducta":{code:"F91.1",desc:"Patrón repetitivo y persistente de comportamiento en el que se violan los derechos básicos de otros o normas sociales propias de la edad. Incluye: agresión a personas/animales, destrucción de la propiedad, engaño o robo, incumplimiento grave de normas. 3 o más criterios en los últimos 12 meses."},
  "Trastorno del espectro autista (TEA) — Nivel 1":{code:"F84.0",desc:"Nivel 1 (requiere apoyo): Déficits en la comunicación social e interacción social en múltiples contextos + patrones restrictivos y repetitivos de comportamiento. Sin apoyo in situ, los déficits causan deterioro notable. Dificultades para iniciar interacciones sociales; respuestas atípicas a aperturas sociales de otros."},
  "Trastorno del espectro autista (TEA) — Nivel 2":{code:"F84.0",desc:"Nivel 2 (requiere apoyo sustancial): Déficits marcados en comunicación social verbal y no verbal; déficits sociales manifiestos incluso con apoyos. Inflexibilidad de comportamiento, dificultad para adaptarse al cambio. Comportamientos restringidos/repetitivos frecuentes."},
  "Trastorno del espectro autista (TEA) — Nivel 3":{code:"F84.0",desc:"Nivel 3 (requiere apoyo muy sustancial): Déficits graves en habilidades de comunicación social verbal y no verbal causan deterioro grave del funcionamiento. Inflexibilidad de comportamiento, extrema dificultad para adaptarse. Gran angustia/dificultad para cambiar el foco de atención."},
  "Trastorno específico del aprendizaje — Lectura":{code:"F81.0",desc:"Dificultades en el aprendizaje y uso de habilidades académicas: lectura de palabras imprecisa o lenta, dificultad para comprender el significado de lo que se lee. Las habilidades de lectura están muy por debajo de lo esperado para la edad cronológica. Persiste al menos 6 meses."},
  "Trastorno específico del aprendizaje — Expresión escrita":{code:"F81.8",desc:"Dificultades con la expresión escrita: ortografía deficiente, gramática y puntuación deficientes, claridad u organización escasa de la expresión escrita. Las habilidades están muy por debajo de lo esperado para la edad."},
  "Trastorno específico del aprendizaje — Matemáticas":{code:"F81.2",desc:"Dificultades en el sentido de los números, memorización de operaciones aritméticas, cálculo correcto o fluido, razonamiento matemático correcto. Las habilidades matemáticas están muy por debajo de lo esperado para la edad."},
  "Trastorno del lenguaje":{code:"F80.2",desc:"Dificultades persistentes en la adquisición y uso del lenguaje en todas sus modalidades (hablado, escrito, lengua de signos). Las capacidades de lenguaje están sustancialmente por debajo de lo esperado para la edad. Inicio en el período de desarrollo temprano."},
  "Trastorno fonológico":{code:"F80.0",desc:"Dificultad persistente en la producción fonológica que interfiere con la inteligibilidad del habla o impide la comunicación verbal de mensajes. Inicio en el período de desarrollo temprano."},
  "Trastorno de estrés postraumático (TEPT)":{code:"F43.1",desc:"Exposición a un suceso traumático seguida de: síntomas intrusivos (recuerdos, sueños, flashbacks), evitación de estímulos relacionados, alteraciones cognitivas y del estado de ánimo negativas, alteraciones en la reactividad (hipervigilancia, respuesta de sobresalto exagerada). Duración superior a 1 mes."},
  "Trastorno de adaptación":{code:"F43.2",desc:"Síntomas emocionales o comportamentales en respuesta a un factor estresante identificable, desarrollados en los 3 meses siguientes al inicio del factor. Malestar excesivo desproporcionado a la gravedad del factor estresante. Los síntomas no duran más de 6 meses una vez que el factor ha desaparecido."},
  "Dificultades contextuales (no clínico)":{code:"Z-codes",desc:"Situaciones que influyen en el estado de salud pero no son enfermedades ni trastornos en sí. Incluye: problemas en relaciones familiares, dificultades de crianza, eventos vitales estresantes, problemas académicos, problemas de adaptación al entorno escolar. No se incluye en el informe como diagnóstico clínico."},
  "En proceso de evaluación — sin diagnóstico definitivo":{code:"—",desc:"El proceso de evaluación está en curso. No se cuenta con información suficiente para establecer un diagnóstico definitivo en este momento. Se continuará con el plan de evaluación propuesto."}
};

function showDSM(diag){
  const d=DSM_DATA[diag];
  if(!d){alert("Información DSM-5 no disponible para este diagnóstico aún.");return;}
  document.getElementById("dsm-code").textContent=d.code;
  document.getElementById("dsm-title").textContent=diag;
  document.getElementById("dsm-body").textContent=d.desc;
  document.getElementById("dsm-modal").classList.add("open");
}
function closeDSM(){document.getElementById("dsm-modal").classList.remove("open");}

// ── File upload ───────────────────────────────────────────────────────────────
async function subirArchivo(input){
  const file=input.files[0];if(!file)return;
  const p=getP();if(!p)return;
  try{
    const ref=storage.ref(`informes/${p.id}/${uid()}_${file.name}`);
    const snap=await ref.put(file);
    const url=await snap.ref.getDownloadURL();
    p.informesPrevios=[...(p.informesPrevios||[]),{nombre:file.name,url}];
    saveP({...p});renderTab();
  }catch(e){alert("Error al subir el archivo. Verifica tu conexión.");}
}
function delArchivo(i){const p=getP();p.informesPrevios=p.informesPrevios.filter((_,x)=>x!==i);saveP({...p});renderTab();}

  db.collection("pacientes").orderBy("createdAt","desc").onSnapshot(snap=>{
    patients=snap.docs.map(d=>({...d.data(),id:d.id}));
    renderList();
    if(selectedId){
      const p=getP();
      if(p){document.getElementById("hdr-name").textContent=p.nombre||"Paciente sin nombre";}
    }
  });
  document.getElementById("loading").style.display="none";

}
init();
